<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Lagersaldo</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body { font-family: Arial; padding:20px; }
table{ width:100%; border-collapse:collapse; text-align:center;}
th{ background:#008724; color:#fff; padding:10px;}
td{ padding:7px; border-bottom:1px solid #ccc;}
button{ padding:6px; margin:2px; cursor:pointer;}
</style>
</head>

<body>

<h2>Lagersaldo</h2>

<button id="exportBtn">💾 Exportera</button>
<input type="file" id="fileInput" accept=".csv,.txt" style="display:none;">
<button onclick="document.getElementById('fileInput').click()">📥 Importera Excel</button>

<br><br>

<input id="search" placeholder="Sök...">

<table>
<thead>
<tr>
<th>Namn</th>
<th>Artikel</th>
<th>Antal</th>
<th>Plats</th>
<th>Plockat</th>
<th>Status</th>
</tr>
</thead>
<tbody id="productList"></tbody>
</table>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyA4...",
  authDomain: "swawebblager.firebaseapp.com",
  databaseURL: "https://swawebblager-default-rtdb.europe-west1.firebasedatabase.app/",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let products = {};

// LOAD
db.ref("products").on("value", snap=>{
  products = snap.val() || {};
  render();
});

// SAVE
function save(){
  db.ref("products").set(products);
}

// RENDER
function render(){
  const list = document.getElementById("productList");
  const search = document.getElementById("search").value.toLowerCase();
  list.innerHTML="";

  Object.keys(products).forEach(key=>{
    const p = products[key];

    if(!(p.article||"").toLowerCase().includes(search) &&
       !(p.location||"").toLowerCase().includes(search)) return;

    const row=document.createElement("tr");

    row.innerHTML=`
<td>${p.name||""}</td>
<td>${p.article}</td>
<td>${p.quantity}</td>
<td>${p.location}</td>
<td>${p.picked||0}</td>
<td>${p.quantity>0?"Tillgänglig":"Slut"}</td>
`;

    list.appendChild(row);
  });
}

// IMPORT
document.getElementById("fileInput").addEventListener("change", importCSV);

function importCSV(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(event){
    let text = event.target.result;

    const rows = text.replace(/\r/g, "").split("\n");
    let newProducts = {};

    rows.forEach((row, index)=>{

      if(index===0 || !row.trim()) return;

      let cols;
      if(row.includes("\t")){
        cols = row.split("\t");
      } else if(row.includes(";")){
        cols = row.split(";");
      } else {
        cols = row.split(",");
      }

      if(cols.length < 3) return;

      let article = (cols[0]||"").trim();
      let quantity = parseInt(cols[1])||0;
      let location = (cols[2]||"").trim();
      let status = (cols[3]||"").trim();
      let picked = parseInt(cols[4])||0;

      if(!article || article.toLowerCase().includes("tom")) return;

      const key = Date.now() + Math.random();

      newProducts[key] = {
        name:"",
        article:article,
        quantity:quantity,
        location:location,
        picked:picked,
        comment: status !== "Tillgänglig" ? status : ""
      };
    });

    if(Object.keys(newProducts).length === 0){
      alert("❌ Fel filformat");
      return;
    }

    products = { ...products, ...newProducts };
    save();

    alert("✅ Import klar! ("+Object.keys(newProducts).length+" artiklar)");

    document.getElementById("fileInput").value="";
  };

  reader.readAsText(file);
}

// EXPORT
document.getElementById("exportBtn").addEventListener("click", () => {
  const dataStr = JSON.stringify(products, null, 2);
  const blob = new Blob([dataStr], {type: "application/json"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "lager.json";
  a.click();

  URL.revokeObjectURL(url);
});

document.getElementById("search").addEventListener("input",render);
</script>

</body>
</html>
