<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Lagersaldo</title>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg:#f4f6f8;
            --card:#fff;
            --text:#1e293b;
            --accent:#008724;
            --border:#e5e7eb;
            --neon:#fff500;
        }

        body.dark {
            --bg:#0f172a;
            --card:rgba(255,255,255,0.05);
            --text:#fff;
            --border:rgba(255,255,255,0.1);
        }

        body {
            font-family:"Segoe UI";
            background:var(--bg);
            color:var(--text);
            padding:20px;
        }

        .container {
            max-width:1100px;
            margin:auto;
            background:var(--card);
            padding:25px;
            border-radius:12px;
            position:relative;
        }

        table {
            width:100%;
            border-collapse:collapse;
            text-align:center;
            table-layout:fixed;
        }

        th {
            background:var(--accent);
            color:#fff;
            padding:10px;
        }

        td {
            padding:7px;
            border-bottom:1px solid var(--border);
            font-size:15px;
        }

        td input {
            font: inherit;
            color: inherit;
            background: transparent;
            border: none;
            padding: 0;
            margin: 0;
            text-align: center;
            width: auto;
            min-width: 40px;
        }

        .neon {
            border-radius: 4px;
            border: 1px solid var(--neon);
            color: var(--text);
            background: transparent;
            box-shadow: 0 0 5px var(--neon),
                        0 0 10px var(--neon),
                        0 0 20px var(--neon),
                        0 0 30px rgba(255, 245, 0, 0.5);
            transition: box-shadow 0.2s ease;
        }

        .neon:focus {
            outline: none;
            box-shadow: 0 0 8px var(--neon),
                        0 0 16px var(--neon),
                        0 0 24px var(--neon),
                        0 0 40px rgba(255, 245, 0, 0.7);
        }

        .out-of-stock {
            background:rgba(255,0,0,0.1);
        }

        button {
            padding:6px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            margin:0 2px;
        }

        .pick-btn { background:#f59e0b; color:#fff; }
        .delete-btn { background:#ef4444; color:#fff; }
        .save-btn { background:#22c55e; color:#fff; }

        #search {
            display: block;
            margin: 20px auto;
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
            width: 60%;
            max-width: 400px;
            text-align: center;
            font-size: 14px;
        }

        #productForm {
            display: none;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 15px;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        #productForm.show {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }

        #productForm input {
            flex: 1 1 150px;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        #login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            gap: 15px;
        }
    </style>
</head>

<body>

<div class="container" id="login-container">
    <h2>🔒 Logga in</h2>
    <input id="login-username" placeholder="Användarnamn"><br><br>
    <input id="login-password" type="password" placeholder="Lösenord"><br><br>
    <button onclick="login()">Logga in</button>
</div>

<div class="container" id="app-container" style="display:none;">
    <h2>
        <span id="startTurtle" style="cursor:pointer; font-size:24px;">📦</span>
        Lagersaldo
        <a href="mobil.html" class="mobile-link">🐢</a>
    </h2>

    <div>
        <button onclick="toggleTheme()">🌙 Dark Mode</button>
        <button id="toggleFormBtn">➕ Ny produkt</button>
        <button id="exportBtn">💾 Exportera lager som JSON</button>
    </div>

    <form id="productForm">
        <input id="name" placeholder="Produktnamn" required>
        <input id="article" placeholder="Artikelnummer" required>
        <input id="quantity" type="number" placeholder="Antal" required>
        <input id="location" placeholder="Lagerplats" required>
        <button>+ Lägg till</button>
    </form>

    <input id="search" placeholder="🔍 Sök...">

    <table>
        <thead>
            <tr>
                <th>Namn</th>
                <th>Artikel</th>
                <th>Antal</th>
                <th>Lagerplats</th>
                <th>Plockat</th>
                <th>Status</th>
                <th>Kommentar</th>
                <th>Åtgärder</th>
            </tr>
        </thead>
        <tbody id="productList"></tbody>
    </table>
</div>

<script>
    // FIREBASE
    const firebaseConfig = {
        apiKey: "AIza...",
        authDomain: "swawebblager.firebaseapp.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function login() {
        const u = document.getElementById("login-username").value;
        const p = document.getElementById("login-password").value;

        if (u === "swapos301" && p === "ost") {
            localStorage.setItem("loggedIn","true");
            showApp();
        } else {
            alert("Fel login");
        }
    }

    function showApp() {
        document.getElementById("login-container").style.display="none";
        document.getElementById("app-container").style.display="block";
    }
</script>

</body>
</html>
